<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Integrat — Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/admin.css">
</head>
<body class="admin-page">
<header class="admin-header">
    <div class="container admin-header__inner">
        <a href="academy.html" class="admin-header__back">← Back to Academy</a>
        <h1>Admin Confirmation</h1>
        <button id="adminLogout" class="btn-black" type="button">LOGOUT</button>
    </div>
</header>

<main class="container admin-main">
    <section class="admin-card" id="adminAccessGuard">
        <h2>Access Required</h2>
        <p>You need an admin account to manage payment requests and doctor appointments.</p>
        <a class="admin-link" href="academy.html">Open academy login</a>
    </section>

    <section class="admin-card" id="adminPanel" hidden>
        <h2>Payment Requests</h2>
        <div id="adminPaymentRequestsList" class="admin-list"></div>
        <p id="adminFeedback" class="admin-feedback"></p>
    </section>

    <section class="admin-card" id="adminAppointments" hidden>
        <h2>Doctor Appointments</h2>
        <div id="adminAppointmentsList" class="admin-list"></div>
    </section>

    <section class="admin-card" id="adminUsers" hidden>
        <h2>Registered Users</h2>
        <div id="adminUsersList" class="admin-list"></div>
    </section>
</main>

<script src="../scripts/shared/config.js"></script>
<script src="../scripts/shared/site-config.js"></script>
<script src="../scripts/shared/i18n.js"></script>
<script src="../scripts/shared/site-data.js"></script>
<script src="../scripts/shared/auth-api.js"></script>
<script src="../scripts/admin.js"></script>
</body>
</html>
