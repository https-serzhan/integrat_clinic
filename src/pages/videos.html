<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Integrat — Course Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/videos.css">
</head>
<body class="videos-page">

<header class="videos-header">
    <a class="videos-back" href="academy.html" aria-label="Back to academy">←</a>
    <span class="videos-close">Close</span>
</header>

<main class="videos-layout">
    <aside class="videos-sidebar" id="videosSidebar"></aside>

    <section class="videos-content">
        <div class="videos-access videos-access--hidden" id="videosAccessBanner"></div>

        <div class="videos-text">
            <h1>Course Viewer</h1>
            <p>Lesson overview</p>
        </div>

        <div class="videos-player" id="videosPlayer">
            <div class="videos-player__stage" id="videosPlayerStage">
                <div class="videos-player__empty">Select a lesson to begin.</div>
            </div>
        </div>

        <div class="videos-controls">
            <div class="videos-progress" id="videosProgress">Lesson 0 of 0</div>

            <div class="videos-nav">
                <button class="videos-nav__btn" id="videosPrevLesson" type="button" aria-label="Previous lesson">←</button>
                <button class="videos-nav__btn" id="videosNextLesson" type="button" aria-label="Next lesson">→</button>
            </div>
        </div>
    </section>
</main>

<script src="../scripts/shared/animations.js"></script>
<script src="../scripts/shared/site-config.js"></script>
<script src="../scripts/shared/i18n.js"></script>
<script src="../scripts/shared/site-data.js"></script>
<script src="../scripts/shared/auth-api.js"></script>
<script src="../scripts/shared/global-nav.js"></script>
<script src="../scripts/videos.js"></script>

                <p class="site-footer__tagline">Next-generation dental ecosystem focused on clinic care, doctors, and academy education.</p>
            </div>

            <nav class="site-footer__links">
                <a class="site-footer__link" href="index.html">HOME</a>
                <a class="site-footer__link" href="clinic.html">CLINIC</a>
                <a class="site-footer__link" href="academy.html">ACADEMY</a>
                <a class="site-footer__link" href="about.html">ABOUT US</a>
            </nav>
        </div>

        <div class="site-footer__meta">
            <p class="site-footer__copy">© 2026 Integrat. All rights reserved.</p>

            <div class="site-footer__socials">
                <a class="site-footer__social" href="https://www.instagram.com/https.serzhan/" aria-label="Instagram" target="_blank" rel="noopener noreferrer"><img src="../../assets/icons/instagram.svg" alt=""></a>

                <a class="site-footer__social" href="#" aria-label="Google"><img src="../../assets/icons/google.svg" alt=""></a>
            </div>
        </div>
    </div>
</footer>
